<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#da291c">
  <title>マックバーガー チャレンジ</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#ffd43b;font-family:system-ui,-apple-system,sans-serif;touch-action:none;user-select:none}
    #game{display:block;width:100%;height:100%}
  </style>
</head>
<body><canvas id="game" aria-label="ハンバーガーを作るゲーム"></canvas>
<script>
(()=>{
  'use strict';
  const c=document.getElementById('game'),g=c.getContext('2d');
  const items=[
    {e:'🍞',n:'バンズ',k:'bun'}, {e:'🥩',n:'おにく',k:'meat'},
    {e:'🧀',n:'チーズ',k:'cheese'}, {e:'🥬',n:'レタス',k:'lettuce'},
    {e:'🍅',n:'トマト',k:'tomato'}, {e:'🥒',n:'ピクルス',k:'pickle'}
  ];
  const recipes=[
    {n:'ハンバーガー',a:['bun','meat','pickle','bun']},
    {n:'チーズバーガー',a:['bun','meat','cheese','pickle','bun']},
    {n:'ビッグバーガー',a:['bun','lettuce','meat','cheese','tomato','bun']}
  ];
  let W,H,dpr,last=0,state='ready',score=0,lives=3,left=45,recipe=recipes[0],built=[],buttons=[],flash='',flashT=0,shake=0;
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  function rr(x,y,w,h,r,fill,stroke,lw=3){g.beginPath();g.roundRect(x,y,w,h,r);if(fill){g.fillStyle=fill;g.fill()}if(stroke){g.strokeStyle=stroke;g.lineWidth=lw;g.stroke()}}
  function resize(){dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';g.setTransform(dpr,0,0,dpr,0,0);layout()}
  function layout(){const pad=10,gap=7,bw=(W-pad*2-gap*2)/3,bh=clamp(H*.09,62,78),y=H-bh*2-gap-16;buttons=items.map((it,i)=>({x:pad+(i%3)*(bw+gap),y:y+Math.floor(i/3)*(bh+gap),w:bw,h:bh,it}))}
  function next(){recipe=recipes[Math.floor(Math.random()*recipes.length)];built=[];flash=recipe.n+'を作って！';flashT=1.2}
  function start(){state='play';score=0;lives=3;left=45;built=[];last=performance.now();next()}
  function choose(k){if(state!=='play'){start();return}const want=recipe.a[built.length];if(k===want){built.push(k);flash='いいね！';flashT=.5;if(built.length===recipe.a.length){score++;flash='できあがり！';flashT=.8;setTimeout(()=>{if(state==='play')next()},420)}}else{lives--;shake=10;flash='ちがうよ！';flashT=.7;if(lives<=0)state='over'}}
  function tap(px,py){if(state!=='play'){start();return}for(const b of buttons)if(px>=b.x&&px<=b.x+b.w&&py>=b.y&&py<=b.y+b.h){choose(b.it.k);return}}
  c.addEventListener('pointerdown',e=>{e.preventDefault();tap(e.clientX,e.clientY)},{passive:false});addEventListener('resize',resize);
  function update(dt){if(state==='play'){left-=dt;if(left<=0){left=0;state='over'}}if(flashT>0)flashT-=dt;shake*=.82}
  function bg(){g.fillStyle='#ffd43b';g.fillRect(0,0,W,H);g.fillStyle='#da291c';g.fillRect(0,0,W,66);g.fillStyle='#fff';g.textAlign='center';g.font='900 25px system-ui';g.fillText('🍔 バーガー チャレンジ',W/2,42);g.fillStyle='#fff7df';g.fillRect(0,66,W,H-66);g.fillStyle='#f2d29b';g.fillRect(0,H*.52,W,H*.19);for(let x=0;x<W;x+=55){g.fillStyle=x%110?'#e7bf83':'#f5dda9';g.fillRect(x,H*.52,55,H*.19)}}
  function itemFor(k){return items.find(i=>i.k===k)}
  function order(){rr(12,78,W-24,112,18,'#fff','#da291c',4);g.fillStyle='#5b2a1e';g.textAlign='center';g.font='900 19px system-ui';g.fillText('ご注文：'+recipe.n,W/2,106);g.font='26px system-ui';const step=clamp((W-50)/recipe.a.length,42,58),sx=W/2-step*(recipe.a.length-1)/2;recipe.a.forEach((k,i)=>{g.globalAlpha=i<built.length?.35:1;g.fillText(itemFor(k).e,sx+i*step,149)});g.globalAlpha=1;g.font='800 13px system-ui';g.fillStyle='#7a4a36';g.fillText('左から順番にタップ！',W/2,176)}
  function burger(){const cx=W/2,base=H*.49;g.save();g.translate(shake?(Math.random()-.5)*shake:0,0);g.textAlign='center';if(!built.length){g.font='20px system-ui';g.fillStyle='#85654e';g.fillText('ここにバーガーを作ろう',cx,base-15)}built.forEach((k,i)=>{g.font='46px system-ui';g.fillText(itemFor(k).e,cx,base-i*33)});g.restore();if(flashT>0){rr(W*.18,H*.31,W*.64,44,18,'rgba(255,255,255,.95)','#ffb000',3);g.fillStyle='#b21f15';g.font='900 17px system-ui';g.fillText(flash,W/2,H*.31+29)}}
  function ui(){g.textAlign='left';g.fillStyle='#5b2a1e';g.font='900 17px system-ui';g.fillText('できた：'+score+'こ',14,216);g.textAlign='center';g.fillText('❤️'.repeat(Math.max(0,lives)),W/2,216);g.textAlign='right';g.fillText('⏰ '+Math.ceil(left),W-14,216);for(const b of buttons){rr(b.x,b.y,b.w,b.h,15,'#fff','#da291c',3);g.textAlign='center';g.font=`${Math.min(31,b.h*.45)}px system-ui`;g.fillText(b.it.e,b.x+b.w/2,b.y+b.h*.48);g.fillStyle='#5b2a1e';g.font='900 12px system-ui';g.fillText(b.it.n,b.x+b.w/2,b.y+b.h*.78)}}
  function overlay(){if(state==='play')return;g.fillStyle='rgba(50,18,8,.68)';g.fillRect(0,0,W,H);rr(W*.1,H*.28,W*.8,H*.3,24,'#fff','#ffd43b',5);g.textAlign='center';g.fillStyle='#da291c';g.font='900 28px system-ui';g.fillText(state==='ready'?'ハンバーガーを作ろう！':'おしごと終了！',W/2,H*.35);g.fillStyle='#4b2a20';g.font='800 18px system-ui';g.fillText(state==='ready'?'注文どおりに材料をタップ':'できたバーガー：'+score+'こ',W/2,H*.405);g.font='900 21px system-ui';g.fillStyle='#fff';rr(W*.22,H*.47,W*.56,58,18,'#da291c');g.fillText(state==='ready'?'スタート':'もう一回',W/2,H*.47+38)}
  function draw(){bg();order();burger();ui();overlay()}
  function loop(t){const dt=Math.min(.05,(t-last)/1000||0);last=t;update(dt);draw();requestAnimationFrame(loop)}
  resize();next();requestAnimationFrame(loop);
})();
</script></body></html>
