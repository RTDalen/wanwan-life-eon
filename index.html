<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>スターコインぼうけん</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#101c42;font-family:system-ui,sans-serif;touch-action:none}body{display:grid;place-items:center}#wrap{position:relative;width:min(100vw,480px);height:100dvh;max-height:900px;overflow:hidden;background:#87d8ff}canvas{width:100%;height:100%;display:block}.hud{position:absolute;top:max(12px,env(safe-area-inset-top));left:14px;right:14px;display:flex;justify-content:space-between;color:#fff;font-weight:900;font-size:19px;text-shadow:0 2px 4px #17345c;background:#1955a9cc;padding:8px 13px;border:3px solid #fff;border-radius:18px}.pad{position:absolute;left:18px;bottom:max(20px,env(safe-area-inset-bottom));width:154px;height:154px}.key{position:absolute;width:54px;height:54px;border:3px solid white;border-radius:17px;background:#1955a9dd;color:white;font-size:27px;font-weight:900;box-shadow:0 5px 0 #0d3778;display:grid;place-items:center;user-select:none}.key:active,.key.on{transform:translateY(4px);box-shadow:0 1px 0 #0d3778;background:#ff9f1c}.up{left:50px;top:0}.down{left:50px;bottom:0}.left{left:0;top:50px}.right{right:0;top:50px}.boost{position:absolute;right:22px;bottom:max(37px,env(safe-area-inset-bottom));width:94px;height:94px;border-radius:50%;border:4px solid #fff;background:#ff3b30;color:#fff;font-size:18px;font-weight:900;box-shadow:0 7px 0 #a81710}.boost:active,.boost.on{transform:translateY(5px);box-shadow:0 2px 0 #a81710;background:#ffb000}.screen{position:absolute;inset:0;background:#11204bd9;display:grid;place-items:center;padding:25px}.card{width:100%;background:#fff;border:6px solid #ffd23f;border-radius:28px;text-align:center;padding:23px 18px;box-shadow:0 10px 0 #d68700}.card h1{margin:0 0 10px;color:#e33122;font-size:31px}.card p{color:#234;font-size:18px;font-weight:750;line-height:1.55}.play{border:0;border-radius:18px;padding:14px 42px;background:#18a957;color:#fff;font-size:23px;font-weight:900;box-shadow:0 6px 0 #087236}.hide{display:none}.tip{position:absolute;right:18px;bottom:145px;color:#fff;font-weight:900;text-shadow:0 2px 3px #17345c;text-align:center;font-size:14px}
</style></head>
<body><div id="wrap">
<canvas id="game"></canvas>
<div class="hud"><span>⭐ <b id="score">0</b>/10</span><span>❤️ <b id="life">3</b></span></div>
<div class="pad"><button class="key up" data-k="up">▲</button><button class="key down" data-k="down">▼</button><button class="key left" data-k="left">◀</button><button class="key right" data-k="right">▶</button></div>
<div class="tip">ダッシュ！</div><button class="boost" data-k="boost">GO!</button>
<div id="screen" class="screen"><div class="card"><h1 id="title">スターコインぼうけん</h1><p id="msg">キャラをボタンで動かして<br>⭐を10こ集めよう！<br>👾にぶつからないでね。</p><button class="play" id="play">スタート</button></div></div>
</div>
<script>
const c=document.querySelector('#game'),x=c.getContext('2d'),wrap=document.querySelector('#wrap');let W,H,dpr,run=false,last=0,score=0,life=3,inv=0;
const key={up:0,down:0,left:0,right:0,boost:0},hero={x:160,y:450,r:22},stars=[],bad=[];
function size(){dpr=Math.min(devicePixelRatio||1,2);W=wrap.clientWidth;H=wrap.clientHeight;c.width=W*dpr;c.height=H*dpr;x.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',size);size();
function rnd(a,b){return a+Math.random()*(b-a)}function place(o,edge=55){o.x=rnd(edge,W-edge);o.y=rnd(100,H-190)}
function reset(){score=0;life=3;hero.x=W/2;hero.y=H*.52;stars.length=0;bad.length=0;for(let i=0;i<5;i++){let s={};place(s);stars.push(s)}for(let i=0;i<3;i++){let b={vx:rnd(-80,80),vy:rnd(-80,80),r:20};place(b);bad.push(b)}sync()}
function sync(){scoreEl.textContent=score;lifeEl.textContent=life}const scoreEl=document.querySelector('#score'),lifeEl=document.querySelector('#life');
function circle(a,b,rr){return Math.hypot(a.x-b.x,a.y-b.y)<rr}
function update(dt){let dx=key.right-key.left,dy=key.down-key.up;if(dx&&dy){dx*=.707;dy*=.707}let sp=key.boost?275:175;hero.x=Math.max(hero.r,Math.min(W-hero.r,hero.x+dx*sp*dt));hero.y=Math.max(82+hero.r,Math.min(H-175-hero.r,hero.y+dy*sp*dt));
for(const s of stars)if(circle(hero,s,hero.r+17)){score++;place(s);sync();if(score>=10)return end(true)}
for(const b of bad){b.x+=b.vx*dt;b.y+=b.vy*dt;if(b.x<b.r||b.x>W-b.r)b.vx*=-1;if(b.y<105||b.y>H-180)b.vy*=-1;if(inv<=0&&circle(hero,b,hero.r+b.r-4)){life--;inv=1.5;sync();hero.x=W/2;hero.y=H*.52;if(life<=0)return end(false)}}inv-=dt}
function bg(){let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#5cc8ff');g.addColorStop(1,'#99e06c');x.fillStyle=g;x.fillRect(0,0,W,H);x.fillStyle='#60bc53';for(let i=0;i<8;i++){let px=(i*137)%W,py=120+(i*211)%(H-330);x.beginPath();x.arc(px,py,18,0,7);x.fill()}x.fillStyle='#fff8';for(let i=0;i<5;i++){let px=(i*101+25)%W,py=110+(i*83)%(H-290);x.font='24px serif';x.fillText('🌼',px,py)}}
function draw(){bg();for(const s of stars){x.save();x.translate(s.x,s.y);x.rotate(performance.now()/600);x.font='35px serif';x.textAlign='center';x.textBaseline='middle';x.fillText('⭐',0,0);x.restore()}for(const b of bad){x.font='39px serif';x.textAlign='center';x.textBaseline='middle';x.fillText('👾',b.x,b.y)}if(inv<=0||Math.floor(inv*10)%2===0){x.save();x.translate(hero.x,hero.y);let moving=key.left||key.right||key.up||key.down;x.rotate(moving?Math.sin(performance.now()/90)*.05:0);x.font='47px serif';x.textAlign='center';x.textBaseline='middle';x.fillText('🧑‍🚀',0,0);x.restore()}x.fillStyle='#ffffffcc';x.font='900 15px system-ui';x.textAlign='center';x.fillText('⭐を集めよう！',W/2,92)}
function loop(t){let dt=Math.min((t-last)/1000,.035);last=t;if(run)update(dt);draw();requestAnimationFrame(loop)}requestAnimationFrame(loop);
document.querySelectorAll('[data-k]').forEach(el=>{let k=el.dataset.k;const on=e=>{e.preventDefault();key[k]=1;el.classList.add('on')},off=e=>{e.preventDefault();key[k]=0;el.classList.remove('on')};el.addEventListener('pointerdown',on);el.addEventListener('pointerup',off);el.addEventListener('pointercancel',off);el.addEventListener('pointerleave',off)});
const map={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',' ':'boost'};addEventListener('keydown',e=>{if(map[e.key])key[map[e.key]]=1});addEventListener('keyup',e=>{if(map[e.key])key[map[e.key]]=0});
const screen=document.querySelector('#screen'),title=document.querySelector('#title'),msg=document.querySelector('#msg'),play=document.querySelector('#play');play.onclick=()=>{reset();run=true;screen.classList.add('hide')};function end(win){run=false;title.textContent=win?'クリア！🎉':'ゲームオーバー';msg.innerHTML=win?'スターを10こ集めたよ！<br>すごい！':'もう一回ちょうせんしよう！';play.textContent='もう一回';screen.classList.remove('hide')}
</script></body></html>
